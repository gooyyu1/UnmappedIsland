# 液体容器の定義。容器本体は「液体を1つ入れられるスロットを持つだけ」にし、
# 飲用・注入・蒸発・スタック判定は represented_by された中身オブジェクト側へ委譲する。

traits:
  liquid_container:
    represented_by: content
    slots:
      content:
        accepts: [{tag: liquid, max: 1}]

  sealed_container:
    tags: [sealed_container]

  wide_open_container:
    tags: [wide_open_container]

  narrow_open_container:
    tags: [narrow_open_container]

  water_liquid:
    tags: [liquid, water_liquid]
    actions:
      drink:
        transfer:
          amount: 1200
          from_prop: liquid_amount
          to_object: actor
          to_prop: hydration
    combinations:
      pour_in:
        with: water_liquid
        transfer:
          amount: 2000
          from_object: dragged
          from_prop: liquid_amount
          to_prop: liquid_amount

  tea_liquid:
    tags: [liquid, tea_liquid]
    actions:
      drink:
        transfer:
          amount: 2000
          from_prop: liquid_amount
          to_object: actor
          to_prop: hydration
        add:
          actor:
            wakefulness: 200
    combinations:
      pour_in:
        with: tea_liquid
        transfer:
          amount: 2000
          from_object: dragged
          from_prop: liquid_amount
          to_prop: liquid_amount

  oil_liquid:
    tags: [liquid, oil_liquid]
    combinations:
      pour_in:
        with: oil_liquid
        transfer:
          amount: 2000
          from_object: dragged
          from_prop: liquid_amount
          to_prop: liquid_amount

object_defs:
  canteen:
    traits: [liquid_container, sealed_container]

  pot:
    traits: [liquid_container, sealed_container]

  bottle:
    traits: [liquid_container, sealed_container]

  jar:
    traits: [liquid_container, narrow_open_container]

  coconut_bowl:
    traits: [liquid_container, wide_open_container]

  empty_liquid_1200:
    tags: [liquid, empty_liquid]
    props:
      liquid_amount:
        value: 0
        range: {min: 0, max: 1200}
    combinations:
      pour_water:
        with: water_liquid
        transfer:
          amount: 2000
          from_object: dragged
          from_prop: liquid_amount
          to_prop: liquid_amount
        destroy: self
        spawn:
          object: water_liquid_1200
      pour_tea:
        with: tea_liquid
        transfer:
          amount: 2000
          from_object: dragged
          from_prop: liquid_amount
          to_prop: liquid_amount
        destroy: self
        spawn:
          object: tea_liquid_1200
      pour_oil:
        with: oil_liquid
        transfer:
          amount: 2000
          from_object: dragged
          from_prop: liquid_amount
          to_prop: liquid_amount
        destroy: self
        spawn:
          object: oil_liquid_1200

  water_liquid_1200:
    traits: [water_liquid]
    props:
      liquid_amount:
        value: 0
        range: {min: 0, max: 1200}
        on_min:
          destroy: self
          spawn:
            object: empty_liquid_1200
        passives:
          - conditions:
              - {object: parent, tag: wide_open_container}
              - {object: ancestor, prop: weather, op: eq, value: cloudy}
            accumulate:
              self:
                liquid_amount: -1
          - conditions:
              - {object: parent, tag: wide_open_container}
              - {object: ancestor, prop: weather, op: eq, value: clear}
            accumulate:
              self:
                liquid_amount: -2
          - conditions:
              - {object: parent, tag: wide_open_container}
              - {object: ancestor, prop: weather, op: eq, value: sunny}
            accumulate:
              self:
                liquid_amount: -3
          - conditions:
              - {object: parent, tag: wide_open_container}
              - {object: ancestor, prop: weather, op: eq, value: scorching}
            accumulate:
              self:
                liquid_amount: -4
          - conditions:
              - {object: parent, tag: narrow_open_container}
              - {object: ancestor, prop: weather, op: eq, value: cloudy}
            accumulate:
              self:
                liquid_amount: -2
          - conditions:
              - {object: parent, tag: narrow_open_container}
              - {object: ancestor, prop: weather, op: eq, value: clear}
            accumulate:
              self:
                liquid_amount: -4
          - conditions:
              - {object: parent, tag: narrow_open_container}
              - {object: ancestor, prop: weather, op: eq, value: sunny}
            accumulate:
              self:
                liquid_amount: -6
          - conditions:
              - {object: parent, tag: narrow_open_container}
              - {object: ancestor, prop: weather, op: eq, value: scorching}
            accumulate:
              self:
                liquid_amount: -8

