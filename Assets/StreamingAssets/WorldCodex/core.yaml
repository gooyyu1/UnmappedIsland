# ゲーム全体の最も基本的な定義（Documents/Engine/GameElementDefinition.md参照）。
# 唯一のシングルトンであるworldと、それが束ねるlocationsスロット・locationトレイトのみを含む。
# 個々のlocation種別（草原・砂浜など地形の具体的な種類）と道はlocations.yamlが、
# 地形生成の定義（軸・LocationType・生成スコープ）はterrain_generation.yamlが持つ。

traits:
  # あらゆる「場所」が共通して持つ構造（ExplorationSystem.md参照）。探索できるかどうか
  # （locations.yamlのexplorable trait）に関わらず、草原のような探索可能な土地も、家のような
  # 探索を伴わない場所も、場所である以上すべてこのtraitを実装する。3種のスロット（木や植物・
  # 建築物や家具などの設置物用のfixtures、アイテム用のitems、キャラクタ用のcharacters）は
  # 「場所」という概念そのものに付随するものであり、探索の可否には依存しないため、ここに置く。
  # worldのlocationsスロットの受け入れ判定用のタグ（4節のtags・7.2節のaccepts参照）も、
  # このtraitが配る。
  #
  # スロットの宣言順には意味がある: spawn（9.4節）は配置先スロットを宣言順に走査するため、
  # itemタグ/fixtureタグのオブジェクトはaccepts判定でitems/fixturesへ自然に振り分けられる。
  # 配置失敗時のフォールバック（親へ強制配置）は先頭スロットへ入るため、itemsを先頭に置く
  # （「持ちきれない物は地面に落ちる」を自然に実現する）。
  location:
    tags: [location]
    slots:
      # アイテムが置かれるスロット。サイズ制限なし。
      items:
        accepts:
          - {tag: item, max: 9999}
      # 木や植物、建築物や家具、洞窟の入口などの設置物スロット。サイズ制限なし。
      fixtures:
        accepts:
          - {tag: fixture, max: 9999}
      # キャラクタを入れるスロット。固定型（fixed_positions）で、スタック数は1つだけ
      # （unit_capacity: 1。stackableは既定true=同種はスタックにまとまるため、枠は1つ）。
      characters:
        accepts:
          - {tag: character, max: 9999}
        unit_capacity: 1
        fixed_positions: true

object_defs:
  world:
    singleton: true
    props:
      # 累積tick数。ゲーム開始からの経過tickをそのまま数え続ける（上限なし）。毎tick自分自身を+1する
      # （プロパティレベルのpassives、8節。常に配列）。
      tick:
        value: 0
        passives:
          - accumulate:
              self:
                tick: 1
      # 1tickに相当するゲーム内時間（分）。この数字自体をここに持たせることで、「1tick=何分か」という
      # 具体的な対応づけへの依存をcore.yaml側に寄せ、ゲーム側（UnmappedIsland.Runtime.WorldSession）は
      # 実行時にこの値を読むだけにする。
      minutes_per_tick:
        value: 15
      # 現在の分（0-59）。59の次で繰り上がり、hourへ+1して0に戻る（6.3節のon_overflow）。setで絶対値0へ
      # 戻すのではなく、addで折り返し量・繰り上げ量を一度に加減算する（1tickで複数span分溢れた場合でも
      # 超過分を保持できるため、こちらのほうが堅牢）。tick駆動のpassivesは持たない。「1tick進める」たびに
      # minutes_per_tick分だけ加算する処理そのものをゲーム側（WorldSession）が担う
      # （毎tick自動でminutes_per_tick分を加算する側と、tick未満の端数を加算する側の両方をYAMLとゲーム側に
      # 分けて持つと、Tickを呼ぶたびに二重に加算されてしまうため。WorldSession参照）。
      minute:
        value: 0
        range: {min: 0, max: 59}
        on_overflow:
          add:
            self:
              minute: -60
              hour: 1
      # 現在の時（0-23）。23の次で繰り上がり、dayへ+1して0に戻る。
      #
      # sunlightへの「時間帯による最低限の寄与」をstages（6.4節）+passives（8節、modify）で表現する。
      # sunlightのもう一方の寄与（晴れているほど追加で明るくなる分）はweather側のconditions付き
      # passiveが担う（weather参照）。両者はどちらもmodifyのため、加算的に重なってsunlightの実効値が決まる。
      # ambient_temperature自体はhourを直接見ず、このsunlight自身のstages経由で補正する（sunlight参照）。
      # 寄与は夜が大きく負、朝・夕方が最低限、昼がより強い、という3段階。夜の値（-100）はweatherが
      # どれだけ明るくしようとしても、sunlightのrange（min:0）によるクランプで必ず0まで打ち消すための
      # ものであり、「夜は日差しの寄与を一切受け付けない」をstagesだけで（weather側にconditionsを
      # 持たせずに）表現するための仕組み（sunlight参照）。夜は0時をまたぐため、最初の段階（min省略の
      # フォールバック、22-23時と0-5時の両方に該当）と最後の段階の2つのYAMLエントリで表現するが、
      # 内容は同じで、概念上は1つの「夜」段階として扱う。時間帯の区切り（6/10/18/22時）・各補正量は
      # いずれも仮の値であり、バランス調整により変わりうる。
      hour:
        value: 0
        range: {min: 0, max: 23}
        on_overflow:
          add:
            self:
              hour: -24
              day: 1
        stages:
          - name: night          # 0-5時（フォールバック）・22-23時（night_late）:
            passives:            # weatherの寄与をsunlightのrangeクランプ経由で無効化する
              - modify:
                  self:
                    sunlight: -100
          - name: morning        # 6-9時: sunlightへ最低限の寄与
            min: 6
            passives:
              - modify:
                  self:
                    sunlight: 2
          - name: day            # 10-17時: sunlightへより強い寄与
            min: 10
            passives:
              - modify:
                  self:
                    sunlight: 5
          - name: evening        # 18-21時: 朝と同じsunlightへの寄与
            min: 18
            passives:
              - modify:
                  self:
                    sunlight: 2
          - name: night_late     # 22-23時: 夜と同じ
            min: 22
            passives:
              - modify:
                  self:
                    sunlight: -100
      # 現在の日（1始まり）。上限は未定のため無制限に加算し続ける（GameElementDefinition.md 17節）。
      day:
        value: 1
      # 現在の天気。シンボル型プロパティ（6.8節）。雨のひどさ・晴れの強さの両方向へ段階を持たせた、
      # cloudyを中心とする7段階とする: storm（暴風雨、heavy_rainより酷い）/heavy_rain（大雨）/
      # light_rain（小雨）/cloudy（曇り）/clear（穏やかで過ごしやすい普通の晴れ。最も頻度が高い、
      # この島の標準的な天気）/sunny（日差しが強い晴れ）/scorching（炎天。sunnyより酷い、特別な対策が
      # 必要な極端な暑さ）。storm・scorchingは両極の極端な天候で、ゲームプレイ上の対策は別途、今後の課題。
      # 遷移の仕組みはClimateSystem.md参照: weather_remainingが0になるたびに、atmospheric_moistureの
      # stages（と、scorchingのみthermal_levelのhot stage）が駆動する*_weightを重みとするpickで
      # 次の値が選ばれる。7値のうちclearを含む全てが遷移先候補（scorchingは蓄熱量がhot帯=乾季後半と
      # その名残の間だけ重みを持つ。stormが雨季後半のsaturated帯で重みを持つのと対称）。
      #
      # sunlightへ「晴れているほど追加で明るくなる」寄与を、weather自身のstages（6.4節）+WhenOwnStage
      # ゲート（8.2節）のmodifyで与える（もう一方、hourの「時間帯による最低限の寄与」はhour参照）。
      # シンボル型プロパティのstages（6.4節）は、名前自体がそのまま比較対象になる（シンボル値自身が
      # 既に「名前の付いた離散値」であるため、ステージ名と比較値を別々に書く理由が無い）。「夜は寄与を
      # 無効化する」という時間帯依存の判定は、weather側ではなくhour側のstagesがsunlightのrangeクランプ
      # 経由で実現する（hour参照）ため、ここでは天候の種類だけを見ればよい。storm・heavy_rainは
      # sunlightへの寄与を持たず、常に寄与なし。数値はいずれも仮の値。
      #
      # 降雨中の自己減算（ClimateSystem.md 3節）: 雨系のstage自身が、毎tick atmospheric_moistureを
      # 減算する（耐久値と同じ「ステージ自身が値を変化させる」パターン）。雨が降り続ければやがて水分が
      # 尽きて乾いた候補が選ばれやすくなる、という貯水池の循環を成立させる。激しい雨ほど速く消費する。
      weather:
        value: clear
        stages:
          - name: storm
            passives:
              - accumulate:
                  self:
                    atmospheric_moisture: -400
          - name: heavy_rain
            passives:
              - accumulate:
                  self:
                    atmospheric_moisture: -300
          - name: light_rain
            passives:
              - modify:
                  self:
                    sunlight: 1
              - accumulate:
                  self:
                    atmospheric_moisture: -200
          - name: cloudy
            passives:
              - modify:
                  self:
                    sunlight: 2
          - name: clear
            passives:
              - modify:
                  self:
                    sunlight: 5
          - name: sunny
            passives:
              - modify:
                  self:
                    sunlight: 7
          - name: scorching
            passives:
              - modify:
                  self:
                    sunlight: 10
      # 太陽光の強さ。hour（時間帯による最低限の寄与、夜は大きく負）とweather（晴れているほど追加で
      # 明るくなる寄与）、両方のmodifyが加算的に重なって決まる、都度導出される実効値（8.3節）。
      # rangeのmin:0によって、夜（hour側の-100）はweatherの寄与がどれだけ大きくても必ず0へ
      # クランプされる。max:20は現状の組み合わせ（最大10）に対する余裕。
      #
      # ambient_temperatureへの補正は、conditionsではなくこのsunlight自身のstages（6.4節）+WhenOwnStageゲート
      # （8.2節）で行う: conditionsはあくまで補助的な追加条件のためのものであり、メインの分岐はstagesが
      # 担うという方針のため。dark（sunlight=0、夜）はやや涼しく、bright（7以上、晴れた昼・晴れた朝夕・
      # 曇りの昼など）はやや暑く、中間のdim（1-6）は補正なし。しきい値・補正量はいずれも仮の値。
      sunlight:
        value: 0
        range: {min: 0, max: 20}
        stages:
          - name: dark    # sunlight=0（フォールバック）: やや涼しい
            passives:
              - modify:
                  self:
                    ambient_temperature: -3
          - name: dim     # sunlight 1-6: 補正なし
            min: 1
          - name: bright  # sunlight 7以上: やや暑い
            min: 7
            passives:
              - modify:
                  self:
                    ambient_temperature: 3
      # 現在の気温。体温（プレイヤーキャラ等が持つ、別の概念）と区別するためambient_temperatureと命名する
      # （ClimateSystem.md参照）。日照による補正はsunlight参照、季節による補正はthermal_level参照。
      ambient_temperature:
        value: 20

      # ===== 気候システム（ClimateSystem.md） =====
      # 季節・天気はいずれも専用オブジェクトではなくworld自身のプロパティ（現在値＋残り時間）で表現する。

      # 現在の季節。calm（穏やか）→wet（雨季）→dry（乾季）→calm→…の固定順で巡回する（ClimateSystem.md 2節）。
      # 各stageは (1)自分が現在の季節であることを示すフラグ（season_is_*、season_remainingの遷移pickの
      # 重みとして使う）、(2)大気水分量・蓄熱量への季節レート（3節の貯水池モデル）を持つ。
      # calmのレートは「ほぼ0」ではなく回復方向（水分+10/蓄熱-1）: 乾季で下がりきった水分量が雨季に
      # ふさわしい水準へじわじわ登り返す途中で3日に1回ほど小雨の閾値（moderate、3000）に触れる、という
      # 序盤の生命線となる降雨サイクルをこのレートが作る（3.1節・3.2節）。
      season:
        value: calm
        stages:
          - name: calm
            passives:
              - modify:
                  self:
                    season_is_calm: 1
              - accumulate:
                  self:
                    atmospheric_moisture: 10
                    thermal_level: -1
          - name: wet
            passives:
              - modify:
                  self:
                    season_is_wet: 1
              - accumulate:
                  self:
                    atmospheric_moisture: 250
                    thermal_level: -1
          - name: dry
            passives:
              - modify:
                  self:
                    season_is_dry: 1
              - accumulate:
                  self:
                    atmospheric_moisture: -100
                    thermal_level: 1
      # 「今の季節はどれか」を0/1で表すフラグ。seasonのstageがmodifyで立てる。season_remainingの
      # 遷移pickが「現在の季節に対応する候補だけが選ばれる」ための重みとして参照する（重みが0の候補は
      # 選ばれないため、0/1の重みはそのまま決定的な条件分岐になる）。
      season_is_calm:
        value: 0
      season_is_wet:
        value: 0
      season_is_dry:
        value: 0
      # 季節サイクルの周回数。0始まりで、dry→calm遷移（1周completion）のたびに+1される。
      # stagesがfirst_cycle_flag/later_cycle_flagを立て、「初回サイクルは30日固定・2周目以降は
      # ランダム」という持続時間の分岐（ClimateSystem.md 2.3節）の重みとして使われる。
      season_cycle:
        value: 0
        stages:
          - name: first
            passives:
              - modify:
                  self:
                    first_cycle_flag: 1
          - name: later
            min: 1
            passives:
              - modify:
                  self:
                    later_cycle_flag: 1
      first_cycle_flag:
        value: 0
      later_cycle_flag:
        value: 0
      # 現在の季節の残りtick数。毎tick-1され、0になった瞬間（on_min）に次の季節へ遷移する。
      # 遷移は3段のpick（10節）: (1)season_is_*の0/1重みで「今の季節」の候補へ決定的に分岐、
      # (2)first/later_cycle_flagの0/1重みで「初回サイクルか否か」に分岐、(3)初回は30日
      # （2880tick）固定、2周目以降は24/30/36日（2304/2880/3456tick）の等確率pickでばらつかせる。
      # dry→calmの遷移（1周が完了する瞬間）だけがseason_cycleを+1する。
      # on_shortfallは宣言だけして何もしない（既定の「下限へクランプ」だと、万一1tickで下限より
      # 下まで飛んだ場合にクランプがon_minを再発火させ、1tickで2回遷移してしまうため）。
      season_remaining:
        value: 2880
        range: {min: 0, max: 999999}
        on_shortfall: {}
        passives:
          - accumulate:
              self:
                season_remaining: -1
        on_min:
          pick:
            - weight: {prop: season_is_calm}
              pick:
                - weight: {prop: first_cycle_flag}
                  set:
                    self: {season: wet, season_remaining: 2880}
                - weight: {prop: later_cycle_flag}
                  pick:
                    - weight: 1
                      set:
                        self: {season: wet, season_remaining: 2304}
                    - weight: 1
                      set:
                        self: {season: wet, season_remaining: 2880}
                    - weight: 1
                      set:
                        self: {season: wet, season_remaining: 3456}
            - weight: {prop: season_is_wet}
              pick:
                - weight: {prop: first_cycle_flag}
                  set:
                    self: {season: dry, season_remaining: 2880}
                - weight: {prop: later_cycle_flag}
                  pick:
                    - weight: 1
                      set:
                        self: {season: dry, season_remaining: 2304}
                    - weight: 1
                      set:
                        self: {season: dry, season_remaining: 2880}
                    - weight: 1
                      set:
                        self: {season: dry, season_remaining: 3456}
            - weight: {prop: season_is_dry}
              pick:
                - weight: {prop: first_cycle_flag}
                  set:
                    self: {season: calm, season_remaining: 2880}
                  add:
                    self: {season_cycle: 1}
                - weight: {prop: later_cycle_flag}
                  pick:
                    - weight: 1
                      set:
                        self: {season: calm, season_remaining: 2304}
                      add:
                        self: {season_cycle: 1}
                    - weight: 1
                      set:
                        self: {season: calm, season_remaining: 2880}
                      add:
                        self: {season_cycle: 1}
                    - weight: 1
                      set:
                        self: {season: calm, season_remaining: 3456}
                      add:
                        self: {season_cycle: 1}
      # 大気水分量（ClimateSystem.md 3節の貯水池）。季節レート＋降雨中の自己減算（weather参照）で駆動される。
      # 0-10000のスケールは、calmの遅いレート（+10/tick、moderate閾値3000まで約3日）を整数のまま表現する
      # ためのもの。stagesは天気そのものではなく（4.1節）、天気候補ごとの重み専用プロパティ（*_weight）を
      # modifyで駆動する（4.3節）。乾き系（sunny/clear/cloudy）の重みも固定定数にせず段階に連動させることで、
      # saturated（雨季後半）では「まず晴れない」（晴れ系の重みなし）を、dry（乾ききった状態）では
      # 「大雨・嵐が原理的に起こらない」（heavy_rain_weight/storm_weight: 0）を表現する。
      # 晴れ系の中ではclear（穏やかで過ごしやすい普通の晴れ）を最も重くし、この島の標準的な天気にする。
      # moderateまでのcalmの雨は必ずlight_rain（heavy/stormの重みが0）: 「3日に1回くらい、大雨には
      # ならない雨」という序盤の要件（3.2節）をこの重み構成が満たす。
      # scorching_weightだけはここではなくthermal_levelのhot stageが駆動する（乾季後半の炎天。thermal_level参照）。
      atmospheric_moisture:
        value: 0
        range: {min: 0, max: 10000}
        stages:
          - name: dry
            passives:
              - modify:
                  self:
                    sunny_weight: 25
                    clear_weight: 45
                    cloudy_weight: 20
                    light_rain_weight: 2
          - name: moderate
            min: 3000
            passives:
              - modify:
                  self:
                    sunny_weight: 10
                    clear_weight: 30
                    cloudy_weight: 25
                    light_rain_weight: 40
          - name: humid
            min: 6000
            passives:
              - modify:
                  self:
                    sunny_weight: 5
                    clear_weight: 10
                    cloudy_weight: 15
                    light_rain_weight: 40
                    heavy_rain_weight: 30
                    storm_weight: 10
          - name: saturated
            min: 8500
            passives:
              - modify:
                  self:
                    cloudy_weight: 5
                    light_rain_weight: 20
                    heavy_rain_weight: 40
                    storm_weight: 40
      # 天気候補ごとの重み。著者が直接setするのではなく、atmospheric_moistureのstages
      # （scorching_weightのみthermal_levelのhot stage）がmodifyで維持する
      # （ベース値0のため、どのstageもmodifyしない候補の重みは0=選ばれない）。
      sunny_weight:
        value: 0
      clear_weight:
        value: 0
      cloudy_weight:
        value: 0
      light_rain_weight:
        value: 0
      heavy_rain_weight:
        value: 0
      storm_weight:
        value: 0
      scorching_weight:
        value: 0
      # 現在の天気の残りtick数。毎tick-1され、0になった瞬間（on_min）に次の天気をpickで選ぶ
      # （ClimateSystem.md 4節）。外側のpickが*_weightを重みに天気を選び、内側のpickが持続時間
      # 4/5/6時間（16/20/24tick）を等確率で選ぶ。同じ天気が連続で選ばれれば6時間超の継続も自然に表現
      # される（4.4節）。初期値20（5時間）は day1 の最初の遷移までの猶予。on_shortfallの空宣言は
      # season_remainingと同じ理由。
      weather_remaining:
        value: 20
        range: {min: 0, max: 999999}
        on_shortfall: {}
        passives:
          - accumulate:
              self:
                weather_remaining: -1
        on_min:
          pick:
            - weight: {prop: sunny_weight}
              pick:
                - weight: 1
                  set:
                    self: {weather: sunny, weather_remaining: 16}
                - weight: 1
                  set:
                    self: {weather: sunny, weather_remaining: 20}
                - weight: 1
                  set:
                    self: {weather: sunny, weather_remaining: 24}
            - weight: {prop: clear_weight}
              pick:
                - weight: 1
                  set:
                    self: {weather: clear, weather_remaining: 16}
                - weight: 1
                  set:
                    self: {weather: clear, weather_remaining: 20}
                - weight: 1
                  set:
                    self: {weather: clear, weather_remaining: 24}
            - weight: {prop: cloudy_weight}
              pick:
                - weight: 1
                  set:
                    self: {weather: cloudy, weather_remaining: 16}
                - weight: 1
                  set:
                    self: {weather: cloudy, weather_remaining: 20}
                - weight: 1
                  set:
                    self: {weather: cloudy, weather_remaining: 24}
            - weight: {prop: light_rain_weight}
              pick:
                - weight: 1
                  set:
                    self: {weather: light_rain, weather_remaining: 16}
                - weight: 1
                  set:
                    self: {weather: light_rain, weather_remaining: 20}
                - weight: 1
                  set:
                    self: {weather: light_rain, weather_remaining: 24}
            - weight: {prop: heavy_rain_weight}
              pick:
                - weight: 1
                  set:
                    self: {weather: heavy_rain, weather_remaining: 16}
                - weight: 1
                  set:
                    self: {weather: heavy_rain, weather_remaining: 20}
                - weight: 1
                  set:
                    self: {weather: heavy_rain, weather_remaining: 24}
            - weight: {prop: storm_weight}
              pick:
                - weight: 1
                  set:
                    self: {weather: storm, weather_remaining: 16}
                - weight: 1
                  set:
                    self: {weather: storm, weather_remaining: 20}
                - weight: 1
                  set:
                    self: {weather: storm, weather_remaining: 24}
            - weight: {prop: scorching_weight}
              pick:
                - weight: 1
                  set:
                    self: {weather: scorching, weather_remaining: 16}
                - weight: 1
                  set:
                    self: {weather: scorching, weather_remaining: 20}
                - weight: 1
                  set:
                    self: {weather: scorching, weather_remaining: 24}
      # 蓄熱量（ClimateSystem.md 3節のもう一つの貯水池）。ambient_temperatureへ季節レートを直接加算すると
      # 整数レート最小の±1/tickでも1季節で±2880になってしまうため、atmospheric_moistureと同じ
      # 「スケールした貯水池のstagesが表向きの値をmodifyする」パターンで段階的な暑さ・涼しさに変換する。
      # dryで+1/tick（25日で0→上限2400、乾季後半ほど暑い）、calm/wetで-1/tick（calmは乾季の暑さから
      # じわじわ涼しくなる回復区間、wetは下限0=coolに張り付く）。初期値1000は「ゲーム開始時は補正なし
      # （mild帯）」のため。
      #
      # hot stageはscorching_weightも駆動する: 蓄熱量が溜まりきった乾季後半（と、その名残が抜けるまでの
      # calm序盤）だけ、炎天（scorching）が天気の抽選に加わる。atmospheric_moistureのsaturated帯が
      # stormを駆動する（雨季後半＋名残の乾季序盤に嵐）のと対称の関係（ClimateSystem.md 4.3節）。
      #
      # 上限2400は残暑（calmへ持ち越される熱）の上限を絞るためのもの: 残暑日数 = (上限-1920)/96 = 最大5日で、
      # 最短のcalm（24日）の序盤（3等分の最初の8日）に必ず収まる。乾季がどれだけ長引いても（蓄熱が上限で
      # 切り捨てられるため）残暑が中盤へ食い込むことはない。乾季中の挙動（scorching開始=乾季20日目、
      # 気温+8、重み50）はすべてhot閾値1920側で決まるため、この上限には依存しない。
      thermal_level:
        value: 1000
        range: {min: 0, max: 2400}
        stages:
          - name: cool
            passives:
              - modify:
                  self:
                    ambient_temperature: -5
          - name: mild
            min: 960
          - name: hot
            min: 1920
            passives:
              - modify:
                  self:
                    ambient_temperature: 8
                    scorching_weight: 50
      # 難易度の初期補正1: ゲーム開始2日目に高確率で雨を降らせる（ClimateSystem.md 5.1節）。
      # ゲーム開始からの経過tickを数えるだけの専用カウンタで、2日目（tick 96-191）の間だけ
      # atmospheric_moistureへ追加加算し、天気の抽選を雨系へ大きく傾ける。天気そのものを固定で
      # 雨にはしない（5.3節）ため、それでも晴れる可能性はゼロではない。
      early_rain_calibration:
        value: 0
        passives:
          - accumulate:
              self:
                early_rain_calibration: 1
        stages:
          - name: idle
          - name: boosting
            min: 96
            passives:
              - accumulate:
                  self:
                    atmospheric_moisture: 60
          - name: done
            min: 192
      # 難易度の初期補正2: 最初の乾季の10日目前後（絶対71日目）に高確率で雨を降らせる（5.2節）。
      # 初回サイクルは各季節30日固定のため、最初のdryは61日目開始・その10日目は71日目
      # （tick 6720-6815）と、ゲーム開始前から確定している。dryの-100/tickを上回る+200/tickを
      # 窓の間だけ加算する。この6720/6816はseason_remainingの「初回サイクル30日固定」に依存した
      # 導出値であり、そちらを変えたらこちらも再計算が必要。
      first_dry_rain_calibration:
        value: 0
        passives:
          - accumulate:
              self:
                first_dry_rain_calibration: 1
        stages:
          - name: idle
          - name: boosting
            min: 6720
            passives:
              - accumulate:
                  self:
                    atmospheric_moisture: 200
          - name: done
            min: 6816
    slots:
      locations:
        # locationタグを持つobject_defのみを受け入れる（種類数の上限は設けない想定のため、
        # 実質無制限を意味する十分に大きな値をmaxに置く。accepts自体は必須フィールドのため省略できない）。
        accepts:
          - {tag: location, max: 9999}
