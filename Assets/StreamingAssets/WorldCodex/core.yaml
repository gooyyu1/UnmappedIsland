# ゲーム全体の最も基本的な定義（Documents/Design/GameElementDefinition.md参照）。
# 唯一のシングルトンであるworldと、それが束ねるlocationsスロット・locationトレイトのみを含む。
# 個々のlocation種別（forest/beachなど地形の具体的な種類）はTerrainGeneration.mdの検討が済み次第、
# 別ファイル（terrains.yaml等）で追加する。

traits:
  # worldのlocationsスロットの受け入れ判定専用のタグ（4節のtags・7.2節のaccepts参照）。中身を持たず、
  # これを参照するobject_defへ`location`タグを配るためだけに存在する。
  location:
    tags: [location]

object_defs:
  world:
    singleton: true
    props:
      # 累積tick数。ゲーム開始からの経過tickをそのまま数え続ける（上限なし）。毎tick自分自身を+1する
      # （プロパティレベルのpassives、8節。常に配列）。
      tick:
        value: 0
        passives:
          - accumulate:
              self:
                tick: 1
      # 1tickに相当するゲーム内時間（分）。この数字自体をここに持たせることで、「1tick=何分か」という
      # 具体的な対応づけへの依存をcore.yaml側に寄せ、ゲーム側（UnmappedIsland.GameTime.WorldClock）は
      # 実行時にこの値を読むだけにする。
      minutes_per_tick:
        value: 15
      # 現在の分（0-59）。59の次で繰り上がり、hourへ+1して0に戻る（6.3節のon_overflow）。setで絶対値0へ
      # 戻すのではなく、addで折り返し量・繰り上げ量を一度に加減算する（1tickで複数span分溢れた場合でも
      # 超過分を保持できるため、こちらのほうが堅牢）。tick駆動のpassivesは持たない。「1tick進める」たびに
      # minutes_per_tick分だけ加算する処理そのものをゲーム側（WorldClock）が担う
      # （毎tick自動でminutes_per_tick分を加算する側と、tick未満の端数を加算する側の両方をYAMLとゲーム側に
      # 分けて持つと、Tickを呼ぶたびに二重に加算されてしまうため。WorldClock参照）。
      minute:
        value: 0
        range: {min: 0, max: 59}
        on_overflow:
          add:
            self:
              minute: -60
              hour: 1
      # 現在の時（0-23）。23の次で繰り上がり、dayへ+1して0に戻る。
      #
      # sunlightへの「時間帯による最低限の寄与」をstages（6.4節）+passives（8節、modify）で表現する。
      # sunlightのもう一方の寄与（晴れているほど追加で明るくなる分）はweather側のstagesが担う
      # （weather参照）。両者はどちらもmodifyのため、加算的に重なってsunlightの実効値が決まる。
      # temperature自体はhourを直接見ず、このsunlight自身のstages経由で補正する（sunlight参照）。
      # 寄与は夜が大きく負、朝・夕方が最低限、昼がより強い、という3段階。夜の値（-100）はweatherが
      # どれだけ明るくしようとしても、sunlightのrange（min:0）によるクランプで必ず0まで打ち消すための
      # ものであり、「夜は日差しの寄与を一切受け付けない」をstagesだけで（weather側にconditionsを
      # 持たせずに）表現するための仕組み（sunlight参照）。夜は0時をまたぐため、最初の段階（min省略の
      # フォールバック、22-23時と0-5時の両方に該当）と最後の段階の2つのYAMLエントリで表現するが、
      # 内容は同じで、概念上は1つの「夜」段階として扱う。時間帯の区切り（6/10/18/22時）・各補正量は
      # いずれも仮の値であり、バランス調整により変わりうる。
      hour:
        value: 0
        range: {min: 0, max: 23}
        on_overflow:
          add:
            self:
              hour: -24
              day: 1
        stages:
          - name: night          # 0-5時（フォールバック）・22-23時（night_late）:
            passives:            # weatherの寄与をsunlightのrangeクランプ経由で無効化する
              - modify:
                  self:
                    sunlight: -100
          - name: morning        # 6-9時: sunlightへ最低限の寄与
            min: 6
            passives:
              - modify:
                  self:
                    sunlight: 2
          - name: day            # 10-17時: sunlightへより強い寄与
            min: 10
            passives:
              - modify:
                  self:
                    sunlight: 5
          - name: evening        # 18-21時: 朝と同じsunlightへの寄与
            min: 18
            passives:
              - modify:
                  self:
                    sunlight: 2
          - name: night_late     # 22-23時: 夜と同じ
            min: 22
            passives:
              - modify:
                  self:
                    sunlight: -100
      # 現在の日（1始まり）。上限は未定のため無制限に加算し続ける（GameElementDefinition.md 17節）。
      day:
        value: 1
      # 現在の天気（0=晴れ, 1=曇り, 2=小雨, 3=大雨）。晴れ→曇り→雨という遷移の仕組み自体は
      # ClimateSystem.mdで別途検討するため、ここでは値を保持するだけ。
      #
      # sunlightへ「晴れているほど追加で明るくなる」寄与を、weather自身のstages（6.4節）+
      # WhenOwnStageゲート（8.2節）のmodifyで与える（もう一方、hourの「時間帯による最低限の寄与」は
      # hour参照）。weatherの値そのものによる分岐はstagesが担い、conditionsは使わない（conditionsは
      # あくまで補助的な追加条件のためのものであり、メインの分岐はstagesが担うという方針のため）。
      # 「夜は寄与を無効化する」という時間帯依存の判定は、weather側ではなくhour側のstagesが
      # sunlightのrangeクランプ経由で実現する（hour参照）ため、ここでは天候の種類だけを見ればよい。
      # heavy_rain（3）はpassivesを持たず、常に寄与なし。数値はいずれも仮の値。
      weather:
        value: 0
        stages:
          - name: clear       # weather=0（フォールバック）: 追加ボーナスが最大
            passives:
              - modify:
                  self:
                    sunlight: 5
          - name: cloudy      # weather=1
            min: 1
            passives:
              - modify:
                  self:
                    sunlight: 2
          - name: light_rain  # weather=2
            min: 2
            passives:
              - modify:
                  self:
                    sunlight: 1
          - name: heavy_rain  # weather=3: 追加ボーナスなし
            min: 3
      # 太陽光の強さ。hour（時間帯による最低限の寄与、夜は大きく負）とweather（晴れているほど追加で
      # 明るくなる寄与）、両方のmodifyが加算的に重なって決まる、都度導出される実効値（8.3節）。
      # rangeのmin:0によって、夜（hour側の-100）はweatherの寄与がどれだけ大きくても必ず0へ
      # クランプされる。max:20は現状の組み合わせ（最大10）に対する余裕。
      #
      # temperatureへの補正は、conditionsではなくこのsunlight自身のstages（6.4節）+WhenOwnStageゲート
      # （8.2節）で行う: conditionsはあくまで補助的な追加条件のためのものであり、メインの分岐はstagesが
      # 担うという方針のため。dark（sunlight=0、夜）はやや涼しく、bright（7以上、晴れた昼・晴れた朝夕・
      # 曇りの昼など）はやや暑く、中間のdim（1-6）は補正なし。しきい値・補正量はいずれも仮の値。
      sunlight:
        value: 0
        range: {min: 0, max: 20}
        stages:
          - name: dark    # sunlight=0（フォールバック）: やや涼しい
            passives:
              - modify:
                  self:
                    temperature: -3
          - name: dim     # sunlight 1-6: 補正なし
            min: 1
          - name: bright  # sunlight 7以上: やや暑い
            min: 7
            passives:
              - modify:
                  self:
                    temperature: 3
      # 現在の気温。具体的な変動の仕組み（季節由来のレート等）はClimateSystem.mdで別途検討する。
      # 日照による補正はsunlight参照。
      temperature:
        value: 20
    slots:
      locations:
        # locationタグを持つobject_defのみを受け入れる（種類数の上限は設けない想定のため、
        # 実質無制限を意味する十分に大きな値をmaxに置く。accepts自体は必須フィールドのため省略できない）。
        accepts:
          - {tag: location, max: 9999}
