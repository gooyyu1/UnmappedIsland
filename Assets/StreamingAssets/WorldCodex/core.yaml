# ゲーム全体の最も基本的な定義（Documents/Design/GameElementDefinition.md参照）。
# 唯一のシングルトンであるworldと、それが束ねるlocationsスロット・locationトレイトのみを含む。
# 個々のlocation種別（forest/beachなど地形の具体的な種類）はTerrainGeneration.mdの検討が済み次第、
# 別ファイル（terrains.yaml等）で追加する。

traits:
  # worldのlocationsスロットの受け入れ判定専用のタグ（4節のtags・7.2節のaccepts参照）。中身を持たず、
  # これを参照するobject_defへ`location`タグを配るためだけに存在する。
  location:
    tags: [location]

object_defs:
  world:
    singleton: true
    props:
      # 累積tick数。ゲーム開始からの経過tickをそのまま数え続ける（上限なし）。毎tick自分自身を+1する
      # （プロパティレベルのpassives、8節。常に配列）。
      tick:
        value: 0
        passives:
          - accumulate:
              self:
                tick: 1
      # 1tickに相当するゲーム内時間（分）。この数字自体をここに持たせることで、「1tick=何分か」という
      # 具体的な対応づけへの依存をcore.yaml側に寄せ、ゲーム側（UnmappedIsland.GameTime.WorldClock）は
      # 実行時にこの値を読むだけにする。
      minutes_per_tick:
        value: 15
      # 現在の分（0-59）。59の次で繰り上がり、hourへ+1して0に戻る（6.3節のon_overflow）。setで絶対値0へ
      # 戻すのではなく、addで折り返し量・繰り上げ量を一度に加減算する（1tickで複数span分溢れた場合でも
      # 超過分を保持できるため、こちらのほうが堅牢）。tick駆動のpassivesは持たない。「1tick進める」たびに
      # minutes_per_tick分だけ加算する処理そのものをゲーム側（WorldClock）が担う
      # （毎tick自動でminutes_per_tick分を加算する側と、tick未満の端数を加算する側の両方をYAMLとゲーム側に
      # 分けて持つと、Tickを呼ぶたびに二重に加算されてしまうため。WorldClock参照）。
      minute:
        value: 0
        range: {min: 0, max: 59}
        on_overflow:
          add:
            self:
              minute: -60
              hour: 1
      # 現在の時（0-23）。23の次で繰り上がり、dayへ+1して0に戻る。
      #
      # sunlightへの「時間帯による最低限の寄与」をstages（6.4節）+passives（8節、modify）で表現する。
      # sunlightのもう一方の寄与（晴れているほど追加で明るくなる分）はweather側のpassiveが担う
      # （weather参照）。両者はどちらもmodifyのため、加算的に重なってsunlightの実効値が決まる。
      # temperature自体はhourを直接見ず、このsunlightの実効値をconditionsで見て補正する（temperature参照）。
      # 寄与は夜が0（passiveなし）、朝・夕方が最低限、昼がより強い、という3段階。夜は0時をまたぐため、
      # 最初の段階（min省略のフォールバック、22-23時と0-5時の両方に該当）と最後の段階の2つのYAMLエントリで
      # 表現するが、内容は同じで、概念上は1つの「夜」段階として扱う。時間帯の区切り（6/10/18/22時）・
      # 各補正量はいずれも仮の値であり、バランス調整により変わりうる。
      hour:
        value: 0
        range: {min: 0, max: 23}
        on_overflow:
          add:
            self:
              hour: -24
              day: 1
        stages:
          - name: night          # 0-5時（フォールバック）・22-23時（night_late）: sunlightへの寄与なし
          - name: morning        # 6-9時: sunlightへ最低限の寄与
            min: 6
            passives:
              - modify:
                  self:
                    sunlight: 2
          - name: day            # 10-17時: sunlightへより強い寄与
            min: 10
            passives:
              - modify:
                  self:
                    sunlight: 5
          - name: evening        # 18-21時: 朝と同じsunlightへの寄与
            min: 18
            passives:
              - modify:
                  self:
                    sunlight: 2
          - name: night_late     # 22-23時: 夜と同じ（sunlightへの寄与なし）
            min: 22
      # 現在の日（1始まり）。上限は未定のため無制限に加算し続ける（GameElementDefinition.md 17節）。
      day:
        value: 1
      # 現在の天気（0=晴れ, 1=曇り, 2=小雨, 3=大雨）。晴れ→曇り→雨という遷移の仕組み自体は
      # ClimateSystem.mdで別途検討するため、ここでは値を保持するだけ（初期値は晴れ）。
      #
      # sunlightへ「晴れているほど追加で明るくなる」寄与をmodifyで与える（もう一方、hourの「時間帯による
      # 最低限の寄与」はhour参照）。この寄与は昼夜を問わず一律ではなく、夜（hourが0-5時・22-23時）である
      # 間はconditions（14節）で無効化する: 晴れていても夜であれば日差しは強くないため、weatherの寄与を
      # ゼロにし、その時間はhour側の最低限の寄与（0）だけがsunlightに残る。大雨（3）はconditionsを持たず、
      # 常に寄与なし（晴れの追加ボーナスが無いだけで、hour側の最低限の寄与は昼夜通してそのまま残る）。
      # 数値はいずれも仮の値。
      weather:
        value: 0
        passives:
          - conditions:
              - {prop: weather, op: eq, value: 0}
              - {prop: hour, op: gte, value: 6}
              - {prop: hour, op: lt, value: 22}
            modify:
              self:
                sunlight: 5
          - conditions:
              - {prop: weather, op: eq, value: 1}
              - {prop: hour, op: gte, value: 6}
              - {prop: hour, op: lt, value: 22}
            modify:
              self:
                sunlight: 2
          - conditions:
              - {prop: weather, op: eq, value: 2}
              - {prop: hour, op: gte, value: 6}
              - {prop: hour, op: lt, value: 22}
            modify:
              self:
                sunlight: 1
      # 太陽光の強さ。hour（時間帯による最低限の寄与）とweather（晴れているほど追加で明るくなる寄与）、
      # 両方のmodifyが加算的に重なって決まる、都度導出される実効値（8.3節）。base自体は0で、寄与を
      # 一切受けない時間帯（夜）は0のままになる。temperature側がこの実効値をconditionsで見て補正する
      # （temperature参照）。
      sunlight:
        value: 0
      # 現在の気温。hourを直接見るのではなく、sunlightの実効値（modifyだけで決まる派生プロパティ）を
      # conditions（14節、実効値を見る）経由で見て補正する。日光が全く無い（0、夜）ときはやや涼しく、
      # 十分に強い（7以上、晴れた昼・晴れた朝夕・曇りの昼）ときはやや暑い。中間は補正なし。
      # sunlightは自分自身をゲートに使わないため、この依存（temperature→sunlight→weather/hour）は
      # 循環しない（PropertyValue.GetEffectiveValue参照）。季節由来のレート等、具体的な変動の仕組みは
      # 別途ClimateSystem.mdで検討する。数値・しきい値はいずれも仮の値。
      temperature:
        value: 20
        passives:
          - conditions:
              - {prop: sunlight, op: eq, value: 0}
            modify:
              self:
                temperature: -3
          - conditions:
              - {prop: sunlight, op: gte, value: 7}
            modify:
              self:
                temperature: 3
    slots:
      locations:
        # locationタグを持つobject_defのみを受け入れる（種類数の上限は設けない想定のため、
        # 実質無制限を意味する十分に大きな値をmaxに置く。accepts自体は必須フィールドのため省略できない）。
        accepts:
          - {tag: location, max: 9999}
