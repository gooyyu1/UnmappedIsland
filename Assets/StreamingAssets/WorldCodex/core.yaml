# ゲーム全体の最も基本的な定義（Documents/Design/GameElementDefinition.md参照）。
# 唯一のシングルトンであるworldと、それが束ねるlocationsスロット・locationトレイトのみを含む。
# 個々のlocation種別（forest/beachなど地形の具体的な種類）はTerrainGeneration.mdの検討が済み次第、
# 別ファイル（terrains.yaml等）で追加する。

traits:
  # worldのlocationsスロットの受け入れ判定専用のタグ（4節のtags・7.2節のaccepts参照）。中身を持たず、
  # これを参照するobject_defへ`location`タグを配るためだけに存在する。
  location:
    tags: [location]

object_defs:
  world:
    singleton: true
    props:
      # 累積tick数。ゲーム開始からの経過tickをそのまま数え続ける（上限なし）。毎tick自分自身を+1する
      # （プロパティレベルのpassives、8節。常に配列）。
      tick:
        value: 0
        passives:
          - accumulate:
              self:
                tick: 1
      # 1tickに相当するゲーム内時間（分）。この数字自体をここに持たせることで、「1tick=何分か」という
      # 具体的な対応づけへの依存をcore.yaml側に寄せ、ゲーム側（UnmappedIsland.GameTime.WorldClock）は
      # 実行時にこの値を読むだけにする。
      minutes_per_tick:
        value: 15
      # 現在の分（0-59）。59の次で繰り上がり、hourへ+1して0に戻る（6.3節のon_overflow）。setで絶対値0へ
      # 戻すのではなく、addで折り返し量・繰り上げ量を一度に加減算する（1tickで複数span分溢れた場合でも
      # 超過分を保持できるため、こちらのほうが堅牢）。tick駆動のpassivesは持たない。「1tick進める」たびに
      # minutes_per_tick分だけ加算する処理そのものをゲーム側（WorldClock）が担う
      # （毎tick自動でminutes_per_tick分を加算する側と、tick未満の端数を加算する側の両方をYAMLとゲーム側に
      # 分けて持つと、Tickを呼ぶたびに二重に加算されてしまうため。WorldClock参照）。
      minute:
        value: 0
        range: {min: 0, max: 59}
        on_overflow:
          add:
            self:
              minute: -60
              hour: 1
      # 現在の時（0-23）。23の次で繰り上がり、dayへ+1して0に戻る。
      #
      # 曇りの日を想定した、時間帯によるtemperatureの補正をstages（6.4節）+passives（8節、modify）で表現する。
      # 日光による影響（晴天時の日中の底上げ等）は別途ClimateSystem.mdで検討するため、ここでは含めない。
      # 補正は3段階のみ（朝・夕方は補正なし、夜はやや涼しい、昼はやや暑い）。夜は0時をまたぐため、
      # 最初の段階（min省略のフォールバック、22-23時と0-5時の両方に該当）と最後の段階の2つのYAMLエントリで
      # 表現するが、内容（−3）は同じで、概念上は1つの「夜」段階として扱う。時間帯の区切り（6/10/18/22時）・
      # 補正量（±3）はいずれも仮の値であり、バランス調整により変わりうる。
      hour:
        value: 0
        range: {min: 0, max: 23}
        on_overflow:
          add:
            self:
              hour: -24
              day: 1
        stages:
          - name: night          # 0-5時（フォールバック）・22-23時（night_late）
            passives:
              - modify:
                  self:
                    temperature: -3
          - name: morning        # 6-9時: 補正なし
            min: 6
          - name: day            # 10-17時: やや暑い
            min: 10
            passives:
              - modify:
                  self:
                    temperature: 3
          - name: evening        # 18-21時: 補正なし
            min: 18
          - name: night_late     # 22-23時: 夜と同じ補正
            min: 22
            passives:
              - modify:
                  self:
                    temperature: -3
      # 現在の日（1始まり）。上限は未定のため無制限に加算し続ける（GameElementDefinition.md 17節）。
      day:
        value: 1
      # 現在の気温。具体的な変動の仕組み（季節・天候由来のレート等）はClimateSystem.mdで別途検討する。
      temperature:
        value: 20
    slots:
      locations:
        # locationタグを持つobject_defのみを受け入れる（種類数の上限は設けない想定のため、
        # 実質無制限を意味する十分に大きな値をmaxに置く。accepts自体は必須フィールドのため省略できない）。
        accepts:
          - {tag: location, max: 9999}
