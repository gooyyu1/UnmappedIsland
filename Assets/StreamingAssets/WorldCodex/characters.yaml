# プレイヤーキャラクターの定義（GameElementDefinition.md参照）。worldと同様、プレイヤーも常に1体だけ
# 存在するシングルトンとして扱う。GameElementDefinition.md 11節以降の`actor`は、実行時にはこのobject_def
# のインスタンスを指す想定（actor自体はどのobject_defにも紐づかない実行文脈上の役割のため、object_defの
# 名前でactorを解決する仕組みは無い。ここではあくまで「プレイヤーキャラの実体を表すobject_def」を定義する）。

object_defs:
  character:
    singleton: true
    props:
      # 満腹度（空腹度の逆）。0になっても即死はしないが、体調不良につながる想定（体調不良自体は未実装。
      # 致死性は体脂肪が担う、body_fat参照）。十分に満腹な状態から水も食料も摂らない場合、1日
      # （96 tick）で空になる想定。桁に余裕を持たせるため-100/tickで減衰し、maxは96*100=9600とする。
      satiety:
        value: 9600
        range: {min: 0, max: 9600}
        passives:
          - accumulate:
              self:
                satiety: -100
      # 水分（乾きの逆）。0で脱水状態を表す。十分に水分を摂った状態から、激しい運動はせず日常生活
      # レベルの活動を続けた場合、水を飲まずに3日（288 tick）ほどで生命に関わるとされる（「水なしでは
      # 3日」という経験則）。satietyと同じく-100/tickで減衰し、maxは288*100=28800とする。
      hydration:
        value: 28800
        range: {min: 0, max: 28800}
        passives:
          - accumulate:
              self:
                hydration: -100
      # 体脂肪。満腹度と異なり、これが尽きると餓死する致死的パラメータ（餓死の実処理自体は未実装、
      # 今後の課題）。現実の標準的な体格なら、水はあっても食料を一切摂らない場合で約1.5〜2ヶ月ほど
      # で生命に関わるとされるが、標準体型でも60日生きられてしまうとサバイバル性が薄れるため、ここでは
      # 「最大限に肥満した状態」の蓄積量を60日（5760 tick）分とする。初期値は標準的な体格を想定し、
      # 15日分（1440 tick）＝maxの1/4とする。satiety等と同じく-100/tickで減衰し、maxは5760*100=576000、
      # 初期値は1440*100=144000とする。食事による回復（食料ごとにどれだけ体脂肪へ回るか）は未実装
      # （今後の課題）。
      body_fat:
        value: 144000
        range: {min: 0, max: 576000}
        passives:
          - accumulate:
              self:
                body_fat: -100
      # 覚醒度（眠気の逆）。0になると強制的に眠りに入る想定（強制睡眠の実処理自体は未実装。致死性は
      # 無い）。強制的に起こされ続けない自然な状態では、約24時間（96 tick）で自分の意思では抗えない
      # 眠気（マイクロスリープ）が始まるとされる。satiety等と同じく-100/tickで減衰し、
      # maxは96*100=9600とする。
      wakefulness:
        value: 9600
        range: {min: 0, max: 9600}
        passives:
          - accumulate:
              self:
                wakefulness: -100
      # 体力（疲労の逆）。0で疲労困憊の状態を表す。
      stamina:
        value: 100
        range: {min: 0, max: 100}
      # 栄養バランス（野菜/肉/穀物・イモの3カテゴリ）。「飽き」（同じ食料を短いスパンで繰り返し食べる
      # ことのペナルティ、別途検討）とは異なり、こちらは粗い粒度で「あるカテゴリの食料を長期間
      # 摂っていない」ことを検出するための仕組み。tick方式（最後に食べてからの経過tickを数える）
      # ではなく数値の増減で表現する: 食料ごとにカロリー密度・栄養密度が異なる（高カロリー低栄養、
      # 低カロリー高栄養）ことや、複数の食材を使った料理が複数カテゴリへ同時に部分加算されることを、
      # そのまま表現できるため（tick方式は「食べたか否か」の二値でしかなく、量の違いを表せない）。
      # 各カテゴリとも、食べると回復し毎tick一定量減っていく、satiety等と同じ構造を持つ。
      # 減少した際の体調不良自体は未実装（今後の課題）。maxおよび減衰量（1週間で空になる想定）は
      # いずれも仮の値。
      vegetable_nutrition:
        value: 67200
        range: {min: 0, max: 67200}
        passives:
          - accumulate:
              self:
                vegetable_nutrition: -100
      meat_nutrition:
        value: 67200
        range: {min: 0, max: 67200}
        passives:
          - accumulate:
              self:
                meat_nutrition: -100
      grain_tuber_nutrition:
        value: 67200
        range: {min: 0, max: 67200}
        passives:
          - accumulate:
              self:
                grain_tuber_nutrition: -100
