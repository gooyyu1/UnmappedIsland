name: Tests

on:
  push:
    branches:
      - main
    paths:
      - 'Assets/Scripts/Codex/**'
      - 'Assets/Scripts/Runtime/**'
      - 'Tests/**'
  pull_request:
    paths:
      - 'Assets/Scripts/Codex/**'
      - 'Assets/Scripts/Runtime/**'
      - 'Tests/**'
  workflow_dispatch:

jobs:
  test:
    name: dotnet test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Run tests
        run: dotnet test Tests/UnmappedIsland.WorldCodex.Tests/UnmappedIsland.WorldCodex.Tests.csproj --configuration Release
