name: Generate docs from Documents

on:
  push:
    branches:
      - main
    paths:
      - 'Documents/**'
      - 'Assets/Scripts/**'
      - 'docfx.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Pandoc
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y pandoc

      - name: Prepare docs output directories
        run: |
          rm -rf docs
          mkdir -p docs/Documents/Design docs/Documents/Planning docs/Documents/Specification

      - name: Convert markdown files to HTML
        run: |
          # スマホでの表示崩れ対策（狭い画面でも余白を詰めてはみ出させない）。githubのviewport meta
          # 自体はpandocの既定テンプレートが常に出力するため、ここではarticleラッパーの余白だけ補正する。
          cat > /tmp/docs-mobile-header.html <<'EOF'
          <style>
            @media (max-width: 600px) {
              .markdown-body { padding: 1rem !important; }
            }
          </style>
          EOF

          PANDOC_OPTS=(
            --standalone
            --metadata charset=utf-8
            --css=https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown-dark.min.css
            --include-in-header=/tmp/docs-mobile-header.html
            --variable=include-before='<article class="markdown-body" style="max-width:900px;margin:2rem auto;padding:1rem 2rem;box-sizing:border-box">'
            --variable=include-after='</article>'
          )

          find Documents -name '*.md' | while read md_file; do
            # Derive output path: Documents/Design/Foo.md -> docs/Documents/Design/Foo.html
            rel="${md_file#Documents/}"          # strip leading "Documents/"
            out_dir="docs/Documents/$(dirname "$rel")"
            out_file="docs/Documents/${rel%.md}.html"
            mkdir -p "$out_dir"
            pandoc "${PANDOC_OPTS[@]}" \
              --metadata title="$(basename "${rel%.md}")" \
              -o "$out_file" \
              "$md_file"
            echo "Generated: $out_file"
          done

      - name: Rewrite internal .md links to .html
        run: |
          # Pandoc does not rewrite links between converted documents, so a link that
          # pointed at another Markdown file (e.g. href="./Design/README.md") is left
          # untouched even though only Design/README.html exists in the output. Rewrite
          # every such relative href (anything without a ":" is treated as relative,
          # so http(s):// and mailto: links are left alone) from .md to .html.
          find docs/Documents -name '*.html' | while read -r html_file; do
            sed -i -E 's/href="([^":]+)\.md(#[^"]*)?"/href="\1.html\2"/g' "$html_file"
          done
          echo "Rewrote internal .md links to .html across docs/Documents/"

      - name: Copy HTML mocks and assets to docs/Documents
        run: |
          # Copy standalone HTML mocks and screenshots from Documents to docs/Documents
          find Documents -name '*.html' -o -name '*.png' -o -name '*.jpg' -o -name '*.gif' | while read asset; do
            rel="${asset#Documents/}"
            dest="docs/Documents/${rel}"
            mkdir -p "$(dirname "$dest")"
            cp "$asset" "$dest"
            echo "Copied: $dest"
          done

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install DocFX
        run: dotnet tool install -g docfx

      - name: Generate API Reference with DocFX
        run: |
          # docfx.json は metadata.dest="api"（一時YAML）、build.dest="docs/Reference" で設定済み。
          # build.content.src="api" を使い、公開HTMLは docs/Reference/ 直下に出力する。
          docfx metadata docfx.json
          docfx build docfx.json
          # DocFX は docs/Reference/index.html を生成しないため、Reference/ 直下の導線ページを追加する。
          # toc.html は断片ファイルのまま保持し、index.html 側に埋め込んでスマホからも見やすくする。
          {
            echo '<!DOCTYPE html>'
            echo '<html lang="ja">'
            echo '<head>'
            echo '  <meta charset="utf-8" />'
            echo '  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />'
            echo '  <title>UnmappedIsland コードリファレンス</title>'
            echo '  <link rel="stylesheet" href="styles/docfx.vendor.min.css" />'
            echo '  <link rel="stylesheet" href="styles/docfx.css" />'
            echo '  <link rel="stylesheet" href="styles/main.css" />'
            echo '  <style>'
            echo '    body { margin: 0; }'
            echo '    .reference-toc-page { max-width: 900px; margin: 0 auto; padding: 1rem 2rem; box-sizing: border-box; }'
            echo '    .reference-toc-page .sidefilter,'
            echo '    .reference-toc-page .sidetoc {'
            echo '      position: static;'
            echo '      width: auto;'
            echo '      top: auto;'
            echo '      bottom: auto;'
            echo '      float: none;'
            echo '      border: none;'
            echo '    }'
            echo '    .reference-toc-page .sidetoc {'
            echo '      overflow: visible;'
            echo '      max-height: none;'
            echo '      padding-bottom: 0;'
            echo '    }'
            echo '    .reference-toc-page .toc { margin: 0; padding: 0; }'
            echo '    .reference-toc-page .sidefilter { padding-left: 0; padding-right: 0; }'
            echo '    @media (max-width: 600px) { .reference-toc-page { padding: 1rem; } }'
            echo '  </style>'
            echo '</head>'
            echo '<body>'
            echo '  <main class="reference-toc-page">'
            echo '    <h1>UnmappedIsland コードリファレンス</h1>'
            echo '    <p><a href="../">トップへ戻る</a></p>'
            cat docs/Reference/toc.html
            echo '  </main>'
            echo '  <script type="text/javascript" src="styles/docfx.vendor.min.js"></script>'
            echo '  <script type="text/javascript" src="styles/docfx.js"></script>'
            echo '  <script type="text/javascript" src="styles/main.js"></script>'
            echo '</body>'
            echo '</html>'
          } > docs/Reference/index.html
          echo "Embedded toc.html into docs/Reference/index.html"

      - name: Generate folder index.html files for Documents subtree
        run: |
          # docs/Documents/ 以下の各フォルダに index.html を生成する。
          # docs/Reference/ は DocFX が独自のナビゲーションを生成するため対象外とする。
          generate_index() {
            local dir="$1"
            local rel="${dir#docs/}"
            local title="${rel:-Documents}"

            {
              echo '<!DOCTYPE html>'
              echo '<html lang="ja"><head><meta charset="utf-8" />'
              echo '<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />'
              echo "<title>${title}</title>"
              echo '<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown-dark.min.css" />'
              echo '<style>@media (max-width: 600px) { .markdown-body { padding: 1rem !important; } }</style>'
              echo '</head><body>'
              echo '<article class="markdown-body" style="max-width:900px;margin:2rem auto;padding:1rem 2rem;box-sizing:border-box">'
              echo "<h1>${title}</h1>"
              echo '<ul>'
              echo '<li><a href="../">.. (親フォルダ)</a></li>'

              find "$dir" -mindepth 1 -maxdepth 1 -type d | sort | while read -r sub; do
                name="$(basename "$sub")"
                echo "<li><a href=\"${name}/\">${name}/</a></li>"
              done

              find "$dir" -mindepth 1 -maxdepth 1 -type f ! -name 'index.html' | sort | while read -r f; do
                name="$(basename "$f")"
                echo "<li><a href=\"${name}\">${name}</a></li>"
              done

              echo '</ul>'
              echo '</article>'
              echo '</body></html>'
            } > "$dir/index.html"
            echo "Generated: $dir/index.html"
          }

          find docs/Documents -type d | sort | while read -r d; do
            generate_index "$d"
          done

      - name: Create top-level index.html
        run: |
          # サイトルートのindex.html：Documents（設計書・仕様書等）と
          # Reference（DocFXによるAPIリファレンス）の両方へ辿れるトップページ。
          cat > docs/index.html << 'INDEXEOF'
          <!DOCTYPE html>
          <html lang="ja">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
            <title>UnmappedIsland</title>
            <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown-dark.min.css" />
            <style>@media (max-width: 600px) { .markdown-body { padding: 1rem !important; } }</style>
          </head>
          <body>
          <article class="markdown-body" style="max-width:900px;margin:2rem auto;padding:1rem 2rem;box-sizing:border-box">
            <h1>UnmappedIsland</h1>
            <ul>
              <li><a href="Documents/">Documents/</a> — 設計書・仕様書・プランニング</li>
              <li><a href="Reference/">Reference/</a> — コードリファレンス（DocFX自動生成）</li>
            </ul>
          </article>
          </body>
          </html>
          INDEXEOF
          echo "Generated: docs/index.html"

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A docs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: auto-generate HTML from Documents markdown [skip ci]"
            git push
          fi
