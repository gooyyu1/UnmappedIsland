<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>UnmappedIsland 画面モック – レスポンシブ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1720;
      --panel: #112633;
      --panel-alt: #18384a;
      --line: rgba(255, 255, 255, 0.14);
      --text: #eef7fb;
      --muted: #b9d0db;
      --accent: #89d7c4;
      --warning: #f1d084;
      --danger: #ee8e8e;
      --gap: 10px;
    }

    * {
      box-sizing: border-box;
    }

    button {
      font: inherit;
      line-height: 1;
      margin: 0;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family:
        "Noto Sans JP",
        "Noto Sans CJK JP",
        "Hiragino Sans",
        "Hiragino Kaku Gothic ProN",
        "Yu Gothic",
        "Meiryo",
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
      background:
        radial-gradient(circle at top, rgba(84, 149, 170, 0.2), transparent 35%),
        var(--bg);
      color: var(--text);
    }

    h2, p {
      margin: 0;
    }

    /* Area name labels - overlaid without affecting layout */
    .area-label {
      position: absolute;
      top: 12px;
      left: 12px;
      font-size: 0.82rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background: rgba(11, 23, 32, 0.85);
      padding: 4px 8px;
      border-radius: 6px;
      pointer-events: none;
      z-index: 10;
    }

    /* Root screen grid */
    .screen {
      display: grid;
      gap: var(--gap);
      padding: var(--gap);
      width: 100%;
      height: 100%;
      grid-template-columns: 840px 220px;
      grid-template-rows: 840px 1fr;
    }

    /* Panel base styling */
    .panel {
      padding: 12px;
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(0, 0, 0, 0.08));
      border: 1px solid rgba(255, 255, 255, 0.08);
      position: relative;
    }

    /* Field Area - Main game field with 3 lanes */
    .field-area {
      grid-column: 1 / -1;
      grid-row: 2;
      display: grid;
      grid-template-rows: repeat(3, 1fr);
      gap: var(--gap);
    }

    .lane {
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 8px;
      padding: 10px;
      border-radius: 16px;
      background: rgba(0, 0, 0, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.06);
      position: relative;
    }

    .lane-label {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 0.82rem;
      color: var(--muted);
      background: rgba(11, 23, 32, 0.85);
      padding: 4px 8px;
      border-radius: 6px;
      pointer-events: none;
      z-index: 10;
    }

    .lane-cards {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 6px;
      align-content: center;
    }

    .card {
      width: 100%;
      aspect-ratio: 57 / 89;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.14), transparent 40%),
        linear-gradient(160deg, rgba(137, 215, 196, 0.3), rgba(17, 38, 51, 0.9));
      display: grid;
      place-items: end center;
      padding: 10px 8px;
      color: var(--text);
      font-size: 0.78rem;
      text-align: center;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
    }

    /* Base area styling - shared by all content areas */
    .area {
      padding: 12px;
      border-radius: 16px;
      background: rgba(0, 0, 0, 0.16);
      border: 1px solid rgba(255, 255, 255, 0.06);
      position: relative;
      display: grid;
    }

    /* Base card styling - shared by all cards */
    .card-base {
      width: auto;
      height: 100%;
      aspect-ratio: 57 / 89;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 10px;
      display: grid;
      text-align: center;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
    }

    /* Info Area - Information panel (840x840) */
    .info-area {
      grid-column: 1;
      grid-row: 1;
      grid-template-rows: 1fr 2fr;
      gap: var(--gap);
    }

    /* Environment Area (Situation Area) - Weather, Conditions, DateTime (top 1/3) */
    .environment-area {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--gap);
      position: relative;
    }

    .tile {
      border-radius: 16px;
      background: rgba(0, 0, 0, 0.16);
      border: 1px solid rgba(255, 255, 255, 0.06);
      padding: 12px;
      display: grid;
      gap: 8px;
      position: relative;
    }

    /* Weather Area */
    .weather-area {
      background: linear-gradient(180deg, rgba(241, 208, 132, 0.2), rgba(0, 0, 0, 0.18));
      display: grid;
      place-items: center;
    }

    .weather-card {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.2), transparent 42%),
        linear-gradient(160deg, rgba(241, 208, 132, 0.42), rgba(17, 38, 51, 0.92));
      align-content: space-between;
    }

    .weather-card strong {
      font-size: 1.5rem;
    }

    .weather-card span {
      font-size: 0.72rem;
      color: var(--muted);
    }

    /* Environment/Conditions Area */
    .conditions-area {
      background: linear-gradient(180deg, rgba(137, 215, 196, 0.12), rgba(0, 0, 0, 0.18));
      display: grid;
      align-content: start;
    }

    .env-cards {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .env-card {
      display: grid;
      gap: 4px;
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
      padding: 6px 8px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      min-width: 48px;
    }

    /* DateTime Area */
    .datetime-area {
      background: linear-gradient(180deg, rgba(137, 215, 196, 0.12), rgba(0, 0, 0, 0.18));
      display: grid;
      align-content: start;
      gap: 8px;
    }

    .calendar-row {
      display: flex;
      gap: 4px;
      flex-wrap: nowrap;
    }

    .calendar-card {
      width: clamp(26px, 3vw, 46px);
      height: clamp(38px, 4.5vw, 70px);
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.15), rgba(0, 0, 0, 0.08) 48%, rgba(255, 255, 255, 0.05) 49%, rgba(0, 0, 0, 0.18)),
        var(--panel-alt);
      display: grid;
      place-items: center;
      font-size: clamp(1rem, 2.4vw, 1.35rem);
      font-weight: 700;
      letter-spacing: 0.04em;
      box-shadow: inset 0 -10px 18px rgba(0, 0, 0, 0.22);
    }

    /* Character Area - Main container divided 1:1 left/right */
    .character-area {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--gap);
      position: relative;
    }

    /* Character Display Area - Left side, divided 2:1 top/bottom */
    .character-display-area {
      display: grid;
      grid-template-rows: 2fr 1fr;
      gap: var(--gap);
    }

    /* Portrait Area */
    .portrait-area {
      background: linear-gradient(180deg, rgba(238, 142, 142, 0.18), rgba(0, 0, 0, 0.18));
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      display: grid;
      place-items: center;
      position: relative;
    }

    .character-portrait {
      margin: 6px;
      width: auto;
      height: 100%;
      aspect-ratio: 57 / 89;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.18), rgba(0, 0, 0, 0.2));
      display: grid;
      place-items: center;
      color: var(--muted);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
      padding: 12px;
    }

    /* Equipment/Condition Area - Divided 1:1 left/right */
    .equipment-condition-area {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--gap);
      position: relative;
    }

    /* Equipment Area and Injury Area */
    .equipment-area,
    .condition-area {
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      display: grid;
      place-items: center;
      position: relative;
    }

    .support-card {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.18), transparent 40%),
        linear-gradient(160deg, rgba(137, 215, 196, 0.24), rgba(17, 38, 51, 0.88));
      align-content: space-between;
    }

    .support-card.injury {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.18), transparent 40%),
        linear-gradient(160deg, rgba(238, 142, 142, 0.32), rgba(17, 38, 51, 0.9));
    }

    .support-card strong {
      font-size: 1rem;
    }

    .support-card span {
      font-size: 0.72rem;
      color: var(--muted);
    }

    /* Status Area - Right side, full height */
    .status-area {
      background: rgba(0, 0, 0, 0.16);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      padding: 12px;
      display: grid;
      gap: 10px;
      align-content: start;
      position: relative;
    }

    .status-row {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 0.86rem;
    }

    .status-bar {
      height: 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.08);
      overflow: hidden;
    }

    .status-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), #59a6f3);
    }

    /* Options Area - Control buttons */
    .options-area {
      grid-column: 2;
      grid-row: 1 / 3;
      display: grid;
      grid-template-rows: 1fr;
      gap: var(--gap);
      padding: 12px;
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(0, 0, 0, 0.08));
      border: 1px solid rgba(255, 255, 255, 0.08);
      position: relative;
    }

    .options-buttons {
      display: grid;
      gap: 10px;
      justify-items: center;
      align-content: center;
      grid-template-columns: 1fr;
    }

    .option-button {
      width: clamp(60px, 80%, 160px);
      aspect-ratio: 1 / 1;
      padding: 0;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: var(--panel-alt);
      color: var(--text);
      display: grid;
      place-items: center;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
      font-size: clamp(1.8rem, 6vw, 2.8rem);
    }

    /* Landscape orientation */
    @media (orientation: landscape) {
      .screen {
        grid-template-columns: 840px 1080px;
        grid-template-rows: 840px 220px;
      }

      .field-area {
        grid-column: 2;
        grid-row: 1 / 3;
      }

      .options-area {
        grid-column: 2;
        grid-row: 2;
      }

      .options-buttons {
        grid-template-columns: repeat(4, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="screen">
    <!-- Info Area -->
    <div class="panel info-area">
      <div class="area-label">情報エリア</div>

      <!-- Environment Area (Situation Area) -->
      <div class="environment-area">
        <div class="area-label">状況エリア</div>
        
        <!-- Weather Area -->
        <div class="tile weather-area">
          <div class="area-label">天候</div>
          <div class="weather-card">
            <span>Weather</span>
            <strong>☁</strong>
            <span>曇り</span>
          </div>
        </div>

        <!-- Conditions/Environment Area -->
        <div class="tile conditions-area">
          <div class="area-label">条件</div>
          <div class="env-cards">
            <div class="env-card"><span>☀️</span><span>日差し</span></div>
            <div class="env-card"><span>🦟</span><span>虫の多さ</span></div>
            <div class="env-card"><span>💧</span><span>湿度</span></div>
            <div class="env-card"><span>🌬️</span><span>風</span></div>
          </div>
        </div>

        <!-- DateTime Area -->
        <div class="tile datetime-area">
          <div class="area-label">日時</div>
          <div class="calendar-row" aria-label="DAY097">
            <div class="calendar-card">D</div>
            <div class="calendar-card">A</div>
            <div class="calendar-card">Y</div>
            <div class="calendar-card">0</div>
            <div class="calendar-card">9</div>
            <div class="calendar-card">7</div>
          </div>
          <div class="calendar-row" aria-label="10:15">
            <div class="calendar-card">1</div>
            <div class="calendar-card">0</div>
            <div class="calendar-card">:</div>
            <div class="calendar-card">1</div>
            <div class="calendar-card">5</div>
          </div>
        </div>
      </div>

      <!-- Character Area - Main 1:1 left/right division -->
      <div class="character-area">
        <div class="area-label">キャラクター</div>

        <!-- Character Display Area (Left) - 2:1 top/bottom -->
        <div class="character-display-area">
          <!-- Portrait Area (top 2/3) -->
          <div class="portrait-area">
            <div class="character-portrait">Survivor</div>
          </div>

          <!-- Equipment/Condition Area (bottom 1/3) - 1:1 left/right -->
          <div class="equipment-condition-area">
            <div class="area-label">装備・怪我</div>
            
            <!-- Equipment Area (left) -->
            <div class="equipment-area">
              <div class="area-label">装備</div>
              <div class="support-card">
                <strong>🎒</strong>
                <span>ロープ / 火打石 / 水袋</span>
              </div>
            </div>

            <!-- Injury Area (right) -->
            <div class="condition-area">
              <div class="area-label">怪我</div>
              <div class="support-card injury">
                <strong>🩹</strong>
                <span>足首ねんざ / 軽い擦り傷</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Status Area (Right, full height) -->
        <div class="status-area">
          <div class="status-row"><span>飢え</span><div class="status-bar"><div class="status-fill" style="width: 52%"></div></div></div>
          <div class="status-row"><span>渇き</span><div class="status-bar"><div class="status-fill" style="width: 66%"></div></div></div>
          <div class="status-row"><span>疲労</span><div class="status-bar"><div class="status-fill" style="width: 37%"></div></div></div>
          <div class="status-row"><span>気分</span><div class="status-bar"><div class="status-fill" style="width: 73%"></div></div></div>
        </div>
      </div>
    </div>

    <!-- Options Area -->
    <div class="panel options-area">
      <div class="area-label">オプション</div>
      <div class="options-buttons">
        <button class="option-button" type="button" aria-label="設定"><span aria-hidden="true">⚙</span></button>
        <button class="option-button" type="button" aria-label="図鑑"><span aria-hidden="true">📘</span></button>
        <button class="option-button" type="button" aria-label="ログ"><span aria-hidden="true">📝</span></button>
        <button class="option-button" type="button" aria-label="終了"><span aria-hidden="true">⏻</span></button>
      </div>
    </div>

    <!-- Field Area -->
    <div class="field-area">
      <!-- Location Lane -->
      <div class="lane">
        <div class="lane-label">ロケーション</div>
        <div class="lane-cards">
          <div class="card">探索</div>
          <div class="card">海岸</div>
          <div class="card">道具</div>
          <div class="card">焚火</div>
          <div class="card">狩り</div>
          <div class="card">釣り</div>
        </div>
      </div>

      <!-- Field Items Lane -->
      <div class="lane">
        <div class="lane-label">フィールドアイテム</div>
        <div class="lane-cards">
          <div class="card">資材</div>
          <div class="card">椰子</div>
          <div class="card">水場</div>
          <div class="card">調査</div>
          <div class="card">薬草</div>
          <div class="card">罠</div>
        </div>
      </div>

      <!-- Hand Lane -->
      <div class="lane">
        <div class="lane-label">ハンド</div>
        <div class="lane-cards">
          <div class="card">寝床</div>
          <div class="card">槍</div>
          <div class="card">採集</div>
          <div class="card">荷物</div>
          <div class="card">修繕</div>
          <div class="card">地図</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
